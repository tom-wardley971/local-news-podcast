name: Generate Daily Podcast

on:
  # Run every day at 7:00 AM UTC (adjust to your timezone)
  schedule:
    - cron: "0 7 * * *"

  # Also allow manual runs from the GitHub Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  generate-podcast:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Needed to commit the RSS feed and create Releases

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run podcast pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/main.py

      - name: Get today's date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload MP3
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: "Podcast — ${{ steps.date.outputs.date }}"
          body: "Auto-generated local news podcast."
          files: output/podcast_${{ steps.date.outputs.date }}.mp3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated RSS feed
        run: |
          git config user.name "Local News AI Bot"
          git config user.email "localnewsbot@github.com"
          git add feed/feed.xml
          git diff --staged --quiet || git commit -m "🎙️ Podcast episode: ${{ steps.date.outputs.date }}"
          git push
